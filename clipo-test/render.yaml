services:
  - type: web
    name: clipo-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx serve dist
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://clipo-test-be.onrender.com/api
      - key: VITE_GOOGLE_CLIENT_ID
        value: 602293352058-mv2k3nu25qs51hdsu9iah0hdfnmtrerg.apps.googleusercontent.com

    staticPublishPath: dist
    disk:
      name: clipo_data
      mountPath: /var/data
      sizeGB: 1
    
    autoDeploy: true

    # Growth plan - adjust based on your traffic needs
    plan: starter
    numInstances: 1
